name: "CodeQL Security Analysis"

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run weekly on Sunday at midnight - catches new CVEs in CodeQL's database
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Manual trigger

jobs:
  analyze:
    name: Analyze C++ Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive  # CryptoNote repos often have submodules

      - name: Sync and update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force
          git submodule status --recursive

      - name: Debug submodule state
        run: |
          echo "Expected miniupnp SHA from superproject:"
          git ls-tree HEAD external/miniupnp || true
          echo
          echo "Actual miniupnp HEAD checked out:"
          git -C external/miniupnp rev-parse HEAD || true
          echo
          echo "Submodule status:"
          git submodule status --recursive || true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libboost-all-dev \
            libssl-dev \
            libzmq3-dev \
            libunbound-dev \
            libsodium-dev \
            libreadline-dev \
            libexpat1-dev \
            libpgm-dev \
            qttools5-dev-tools \
            libhidapi-dev \
            libusb-1.0-0-dev \
            libprotobuf-dev \
            protobuf-compiler \
            libudev-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          build-mode: manual
          # Use security-and-quality for broader coverage
          queries: security-and-quality

      - name: Build with CodeQL tracing
        run: |
          rm -rf build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DMANUAL_SUBMODULES=1
          cmake --build build --target release-all -- -j2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"

      # - name: Perform CodeQL Analysis
      #   uses: github/codeql-action/analyze@v3
      #   with:
      #     category: "/language:cpp"
